<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chess Tutor - Prototipo Final</title>
    
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; background: #2c3e50; color: white; margin: 0; min-height: 100vh; }
        #main-container { display: flex; width: 100%; max-width: 1300px; margin: auto; gap: 16px; padding: 16px; align-items: flex-start; }
        
        #board-container { flex: 0 0 auto; }
        #board { width: 480px; }

        .info-panel { margin-top: 10px; background: #34495e; padding: 12px 15px; border-radius: 8px; font-size: 14px; }
        .info-panel span { color: #1abc9c; font-weight: bold; }

        .board-controls { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
        .btn-row { display: flex; gap: 6px; flex-wrap: wrap; }

        .ctrl-btn {
            padding: 8px 14px; border: none; border-radius: 5px; cursor: pointer;
            font-size: 13px; font-weight: 600; color: white; transition: opacity 0.2s; flex: 1;
        }
        .ctrl-btn:hover { opacity: 0.85; }
        .btn-reset { background: #27ae60; }
        .btn-clear { background: #c0392b; }
        .btn-flip  { background: #8e44ad; }
        .btn-load  { background: #2980b9; flex: 0 0 auto; padding: 8px 12px; }

        .fen-row { display: flex; gap: 6px; }
        .fen-row input {
            flex: 1; padding: 8px 10px; border: 1px solid #1abc9c; border-radius: 5px;
            background: #1a252f; color: white; font-size: 12px;
        }

        .btn-mode-toggle {
            width: 100%; padding: 8px; border: none; border-radius: 5px;
            cursor: pointer; font-size: 13px; font-weight: 700; color: white;
            background: #e67e22; transition: all 0.2s; margin-top: 2px;
        }
        .btn-mode-toggle.active { background: #27ae60; }

        .piece-editor { background: #34495e; border-radius: 8px; padding: 12px; margin-top: 4px; }
        .piece-editor h4 { margin: 0 0 8px; font-size: 13px; color: #bdc3c7; text-transform: uppercase; }
        .piece-group-label { font-size: 11px; color: #95a5a6; margin-bottom: 4px; }
        .piece-palette { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
        .piece-btn {
            width: 44px; height: 44px; border: 2px solid transparent; border-radius: 6px;
            background: #2c3e50; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .piece-btn img { width: 36px; height: 36px; }
        .piece-btn.selected { border-color: #f39c12; background: #1a252f; }

        #right-panel { flex: 1; display: flex; flex-direction: column; gap: 10px; min-width: 0; }
        #chat-container { display: flex; flex-direction: column; background: #34495e; border-radius: 8px; overflow: hidden; height: 560px; }
        #chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 12px; border-radius: 15px; max-width: 85%; font-size: 14px; line-height: 1.4; }
        .ai-msg { background: #1abc9c; align-self: flex-start; color: #1a252f; }
        .user-msg { background: #3498db; align-self: flex-end; }
        
        .chat-input-area { display: flex; padding: 10px; background: #2c3e50; gap: 5px; }
        .chat-input-area input { flex: 1; padding: 10px; border: none; border-radius: 4px; background: #1a252f; color: white; outline: none; }
        .chat-input-area button { padding: 10px 14px; border: none; border-radius: 4px; background: #e67e22; color: white; cursor: pointer; }
        #mic-btn { background: #e74c3c; }
        .recording { animation: pulse 1s infinite; background: #c0392b !important; }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    </style>
</head>
<body>

<div id="main-container">
    <div id="board-container">
        <div id="board"></div>
        <div class="info-panel">
            <strong>Estado:</strong> <span id="status">Turno: Blancas ♔</span><br>
            <strong>stockfish:</strong> <span id="eval">Inactivo</span>
        </div>

        <div class="board-controls">
            <div class="btn-row">
                <button class="ctrl-btn btn-reset" onclick="resetBoard()">↺ Reiniciar</button>
                <button class="ctrl-btn btn-clear" onclick="clearBoard()">✕ Limpiar</button>
                <button class="ctrl-btn btn-flip"  onclick="flipBoard()">⇅ Girar</button>
            </div>
            <div class="fen-row">
                <input type="text" id="fen-input" placeholder="Pega un FEN..." />
                <button class="ctrl-btn btn-load" onclick="loadFen()">Cargar</button>
            </div>
            <button class="btn-mode-toggle" id="modeToggleBtn" onclick="toggleEditMode()">✏️ Activar modo edición</button>

            <div class="piece-editor" id="pieceEditor" style="display:none">
                <h4>🎨 Paleta de piezas</h4>
                <div class="piece-group-label">BLANCAS</div>
                <div class="piece-palette" id="whitePalette"></div>
                <div class="piece-group-label">NEGRAS</div>
                <div class="piece-palette" id="blackPalette"></div>
            </div>
        </div>
    </div>

    <div id="right-panel">
        <div id="chat-container">
            <div id="chat-messages">
                <div class="msg ai-msg">¡Listo! Mueve una pieza para empezar el análisis.</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Escribe tu duda...">
                <button id="send-btn">Enviar</button>
                <button id="mic-btn">🎤</button>
            </div>
        </div>
    </div>
</div>

<script>
// --- CONFIGURACIÓN ---
var makeWebhookUrl = "TU_URL_DE_MAKE_AQUI"; 
var PIECE_IMG = 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png';

// --- ESTADO ---
var board = null;
var game = new Chess();
var engine = null;
var currentEval = "0.0";
var bestMove = "";
var editMode = false;
var selectedPiece = null;

// Inicialización segura del Motor
try {
    engine = new Worker("stockfish.js");
    engine.onmessage = function(event) {
        var line = event.data;
        if (line.includes('score cp')) {
            var match = line.match(/score cp (-?\d+)/);
            if (match) currentEval = (parseInt(match[1]) / 100).toFixed(1);
        }
        if (line.startsWith('bestmove')) {
            bestMove = line.split(' ')[1];
            $('#eval').text("Eval: " + currentEval + " | Sugerido: " + bestMove);
        }
    };
} catch(e) {
    console.log("stockfish.js no encontrado. El tablero funcionará sin motor local.");
}

function analizarPosicion() {
    if (!engine) return;
    engine.postMessage('position fen ' + game.fen());
    engine.postMessage('go depth 12');
}

// --- LÓGICA DEL TABLERO ---
function onDrop(source, target) {
    if (editMode) return 'snapback';
    var move = game.move({ from: source, to: target, promotion: 'q' });
    if (move === null) return 'snapback';
    
    updateStatus();
    analizarPosicion();
    
    setTimeout(() => {
        enviarAMake("Movimiento: " + move.san, game.fen());
    }, 1000);
}

function updateStatus() {
    var status = game.turn() === 'w' ? 'Turno: Blancas ♔' : 'Turno: Negras ♚';
    if (game.in_checkmate()) status = '¡Jaque Mate!';
    $('#status').html(status);
}

// --- MODO EDICIÓN ---
function toggleEditMode() {
    editMode = !editMode;
    selectedPiece = null;
    $('.piece-btn').removeClass('selected');
    if (editMode) {
        $('#modeToggleBtn').text('✅ Guardar Posición').addClass('active');
        $('#pieceEditor').show();
        board.draggable(false);
    } else {
        $('#modeToggleBtn').text('✏️ Activar modo edición').removeClass('active');
        $('#pieceEditor').hide();
        board.draggable(true);
        var fen = ChessBoard.objToFen(board.position()) + ' ' + (game.turn()) + ' KQkq - 0 1';
        game.load(fen);
    }
}

function buildPalette(id, pieces) {
    pieces.forEach(p => {
        var btn = $(`<button class="piece-btn"><img src="${PIECE_IMG.replace('{piece}', p)}"></button>`);
        btn.click(() => { 
            selectedPiece = p; 
            $('.piece-btn').removeClass('selected'); 
            btn.addClass('selected'); 
        });
        $('#' + id).append(btn);
    });
}

// --- INICIO ---
$(document).ready(function() {
    buildPalette('whitePalette', ['wK','wQ','wR','wB','wN','wP']);
    buildPalette('blackPalette', ['bK','bQ','bR','bB','bN','bP']);

    board = ChessBoard('board', {
        draggable: true,
        position: 'start',
        onDrop: onDrop,
        onSnapEnd: () => board.position(game.fen()),
        pieceTheme: PIECE_IMG
    });

    $('#board').on('click', '.square-55d63', function() {
        if (!editMode) return;
        var square = $(this).attr('data-square');
        var pos = board.position();
        if (selectedPiece) pos[square] = selectedPiece;
        else delete pos[square];
        board.position(pos);
    });
});

// --- COMUNICACIÓN ---
async function enviarAMake(msg, fen) {
    addMessage("user", msg);
    try {
        const res = await fetch(makeWebhookUrl, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ mensaje: msg, fen: fen, eval: currentEval, best: bestMove })
        });
        const data = await res.json();
        if (data.texto_pedagogico) addMessage("ai", data.texto_pedagogico);
        if (data.audioUrl) new Audio(data.audioUrl).play();
    } catch(e) { console.error(e); }
}

function addMessage(s, t) {
    $('#chat-messages').append(`<div class="msg ${s}-msg">${t}</div>`);
    $('#chat-messages').scrollTop($('#chat-messages')[0].scrollHeight);
}

// --- FUNCIONES BOTONES ---
function resetBoard() { game.reset(); board.start(); updateStatus(); }
function clearBoard() { board.clear(); game.clear(); }
function flipBoard() { board.flip(); }
function loadFen() {
    var f = $('#fen-input').val();
    if (game.load(f)) { board.position(f); updateStatus(); }
}

// --- VOZ ---
const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
if (Speech) {
    const rec = new Speech();
    rec.lang = 'es-ES';
    $('#mic-btn').click(() => { rec.start(); $('#mic-btn').addClass('recording'); });
    rec.onresult = (e) => { 
        $('#mic-btn').removeClass('recording');
        enviarAMake(e.results[0][0].transcript, game.fen()); 
    };
    rec.onerror = () => $('#mic-btn').removeClass('recording');
}
</script>
</body>
</html>
